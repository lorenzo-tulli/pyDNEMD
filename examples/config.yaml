# =============================================================================
# pyDNEMD example configuration
# Replace all /absolute/path/to/... values with paths on your system.
# Example input files are provided in examples/inputs/.
# =============================================================================

# --- Input files -------------------------------------------------------------
input_gro: /absolute/path/to/solv_ions.gro
topology:  /absolute/path/to/topol.top
index_ndx: /absolute/path/to/index.ndx

# System name (used for output file labels)
system_name: SYSTEM

# GROMACS executable use gmx_mpi on most HPC clusters, gmx locally
gmx: gmx_mpi

# MDP templates directory
mdp_dir: /absolute/path/to/templates

# Output directory for all results
output_dir: /absolute/path/to/output

# --- Equilibrium simulation --------------------------------------------------
n_runs: 2                  # number of independent replicates

# --- Frame extraction (dnemd-extract) ----------------------------------------
# Range and frequency at which EQ trajectory frames are used as NE/NP starts.
# Values below produce frames at 1, 2, 3, 4, 5 ns.
extract_start_ps:     1000    # ps start of production used for NE/NP
extract_end_ps:       5000   # ps end of production used for NE/NP
extract_frequency_ps: 1000    # ps spacing between NE/NP starting frames

# ns window labels written to disk by dnemd-extract (must match the range above)
extract_ns_start:    1
extract_ns_end:      5
extract_ns_interval: 1

# --- Simulation directories (used by dnemd-extract) --------------------------
eq_sim_dir: /absolute/path/to/output
ne_sim_dir: /absolute/path/to/output
np_sim_dir: /absolute/path/to/output

# Index file for NE/NP centering generated by dnemd-create-ne-np
ne_index: /absolute/path/to/output/perturbed_topology/perturbed_index.ndx

# --- DNEMD analysis (dnemd-analyse-dnemd) ------------------------------------
# Time points (ps) to analyse
time_points_ps: [0, 1000]

# Significance threshold in units of standard error (1 or 2)
se_threshold: 1

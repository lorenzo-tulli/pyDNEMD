# Paths to your input files
input_gro: /path/to/input/solv_ions.gro
topology:  /path/to/input/topol.top
index_ndx: /path/to/input/index.ndx

# System name (used for output labels)
system_name: SYSTEM

# GROMACS executable (use gmx_mpi or gmx depending on your HPC)
gmx: gmx_mpi

# MDP templates directory — point to templates/test/ for short test runs
mdp_dir: /path/to/templates/test

# Output directory for all results
output_dir: /path/to/output

# Equilibrium simulation settings
n_runs: 2                  # 2 replicates for testing

# NE/NP frame extraction: 5 frames from 2-10 ns (every 2 ns)
extract_start_ps:     2000    # ps — 2 ns
extract_end_ps:       10000   # ps — 10 ns (matches test production.mdp)
extract_frequency_ps: 2000    # ps — every 2 ns -> frames at 2,4,6,8,10 ns

# --- Simulation directories (used by dnemd-extract) ---
# All three point to output_dir: the package writes EQ_*, TRJDUMP_NE, TRJDUMP_NP there
eq_sim_dir:  /path/to/output
ne_sim_dir:  /path/to/output
np_sim_dir:  /path/to/output

# Index file used for NE/NP centering and PBC correction (created by dnemd-create-ne-np)
ne_index:    /path/to/output/perturbed_topology/perturbed_index.ndx

# ns windows to extract from NE/NP trajectories (must match extraction above)
extract_ns_start:    2
extract_ns_end:      10
extract_ns_interval: 2

# DNEMD analysis settings — time points within the 1 ns NE/NP simulations
time_points_ps: [0, 10, 100, 500, 1000]
se_threshold: 1               # 1 or 2 SE significance threshold